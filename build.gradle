plugins {
    id 'java-library'
}



repositories {
    mavenCentral()
}

dependencies {

    testImplementation ("org.junit.jupiter:junit-jupiter:5.14.2",
            "com.codeborne:selenide:7.14.0",
            "net.datafaker:datafaker:2.5.4")
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

test {
    useJUnitPlatform()
}